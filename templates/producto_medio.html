{% extends 'base.html' %}

{% block content %}
<header class="page-header">
    <h1>Producto Medio</h1>
    <p>Multiplica dos semillas consecutivas y extrae los dígitos centrales del resultado.</p>
</header>

<div class="config-grid">
    <section class="card">
        <h3>Parámetros</h3>
        <form id="form-generico" data-endpoint="/api/generar/producto_medio" class="config-form">
            <div class="input-group">
                <label>Semilla X₀</label>
                <input type="number" id="gen-x0" value="5015" required>
            </div>
            <div class="input-group">
                <label>Semilla X₁</label>
                <input type="number" id="gen-x1" value="5734" required>
            </div>
            <div class="input-group">
                <label>Dígitos (d)</label>
                <input type="number" id="gen-d" value="4" required>
            </div>
            <div class="input-group">
                <label>Cantidad</label>
                <input type="number" id="gen-n" value="1000" required>
            </div>
            <button type="submit" class="btn">Generar</button>
        </form>
    </section>

    <div class="card chart-card">
        <h3>Distribución</h3>
        <canvas id="chart-generico"></canvas>
    </div>
</div>

<div class="config-grid single">
    <div class="card">
        <h3>Primeros 20 valores</h3>
        <div class="table-container">
            <table id="table-generico">
                <thead><tr><th>Iteración</th><th>Y_i</th><th>R_n</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
