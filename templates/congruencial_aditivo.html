{% extends 'base.html' %}

{% block content %}
<header class="page-header">
    <h1>Congruencial Aditivo</h1>
    <p>Usa una secuencia de semillas previas: X_{n} = (X_{n-1} + X_{n-k}) mod m.</p>
</header>

<div class="config-grid">
    <section class="card">
        <h3>Parámetros</h3>
        <form id="form-generico" data-endpoint="/api/generar/congruencial_aditivo" class="config-form">
            <div class="input-group full-width">
                <label>Semillas (separadas por coma)</label>
                <input type="text" id="gen-semillas" value="65, 89, 98, 3, 69" required>
            </div>
            <div class="input-group">
                <label>Módulo (m)</label>
                <input type="number" id="gen-m" value="100" required>
            </div>
            <div class="input-group">
                <label>Cantidad</label>
                <input type="number" id="gen-n" value="1000" required>
            </div>
            <button type="submit" class="btn">Generar</button>
        </form>
    </section>

    <div class="card chart-card">
        <h3>Distribución</h3>
        <canvas id="chart-generico"></canvas>
    </div>
</div>

<div class="config-grid single">
    <div class="card">
        <h3>Primeros 20 valores</h3>
        <div class="table-container">
            <table id="table-generico">
                <thead><tr><th>Iteración</th><th>X_n</th><th>R_n</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
